<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <!-- 苹果全屏 Web App 支持 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>智能仓库盘点系统</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #f5f7fb; --card-bg: #fff; --text: #1e293b; --text-secondary: #64748b;
            --border: #e9eef3; --primary: #1b4a6b; --primary-light: #e6edf6; --danger: #b33a3a;
            --success: #0e6245; --header-bg: linear-gradient(135deg, #0f2b4b, #1b4a6b);
            --input-bg: #fff; --shadow: rgba(0,0,0,0.08); --font-size-base: 1rem;
            --scan-line-color: #4cc9f0; --scan-window-size: 45%; --camera-preview-height: 50vh;
        }
        .night-mode {
            --bg: #1a1f2e; --card-bg: #232a3b; --text: #e2e8f0; --text-secondary: #94a3b8;
            --border: #334155; --primary: #3b82f6; --primary-light: #1e3a5f; --danger: #ef4444;
            --success: #22c55e; --header-bg: linear-gradient(135deg, #0f172a, #1e293b);
            --input-bg: #334155; --shadow: rgba(0,0,0,0.3); --scan-line-color: #60a5fa;
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family: system-ui, -apple-system, sans-serif; }
        body { background: linear-gradient(135deg, #0f2b4b 0%, #1b4a6b 100%); min-height:100vh; display:flex; justify-content:center; align-items:center; padding:16px; font-size:var(--font-size-base); -webkit-tap-highlight-color:transparent; user-select:none; }

        .auth-container { width:100%; max-width:400px; background:var(--card-bg); color:var(--text); border-radius:24px; box-shadow:0 20px 40px var(--shadow); padding:32px 24px; text-align:center; display:flex; flex-direction:column; gap:14px; z-index:1; }
        .auth-container h1 { font-size:1.8rem; color:var(--primary); }
        .auth-container input { width:100%; padding:14px 16px; border-radius:12px; border:1px solid var(--border); background:var(--input-bg); color:var(--text); font-size:1rem; }
        .auth-container input::placeholder { color:var(--text-secondary); }
        .btn-full { width:100%; padding:14px; border:none; border-radius:30px; font-weight:600; font-size:1rem; cursor:pointer; }
        .btn-primary { background:var(--primary); color:white; }
        .btn-secondary { background:#555; color:white; }
        .btn-outline { background:transparent; color:var(--text-secondary); border:1px solid var(--border); padding:10px; border-radius:30px; cursor:pointer; }
        .btn-row { display:flex; gap:10px; }
        .error-text { color:var(--danger); font-size:0.8rem; min-height:20px; }

        #appMain { position:fixed; top:0; left:0; right:0; bottom:0; z-index:100; display:none; }
        .app-container { width:100%; height:100%; background:var(--bg); color:var(--text); display:flex; flex-direction:column; }
        .header { background:var(--header-bg); color:white; padding:10px 20px; text-align:center; flex-shrink:0; position: relative; }
        .header h1 { font-size:1.2rem; font-weight:600; }
        .view { flex:1; display:none; flex-direction:column; padding:16px 20px 20px; gap:16px; overflow-y:auto; background:var(--bg); color:var(--text); -webkit-overflow-scrolling:touch; }
        .view.active { display:flex; }

        .bottom-nav { display:flex; border-top:1px solid var(--border); background:var(--card-bg); flex-shrink:0; padding:8px 0 env(safe-area-inset-bottom); }
        .nav-item { flex:1; text-align:center; padding:12px 4px; font-weight:600; font-size:0.85rem; color:var(--text-secondary); cursor:pointer; border-bottom:3px solid transparent; transition:0.2s; display:flex; flex-direction:column; align-items:center; gap:2px; }
        .nav-item.active { color:var(--primary); border-bottom-color:var(--primary); }
        .nav-item span { font-size:0.75rem; opacity:0.8; }

        .card { background:var(--card-bg); border-radius:18px; padding:16px; border:1px solid var(--border); color:var(--text); }
        .btn { border:none; background:var(--card-bg); padding:10px 18px; border-radius:30px; font-weight:600; font-size:0.9rem; display:inline-flex; align-items:center; gap:6px; box-shadow:0 4px 10px var(--shadow); cursor:pointer; color:var(--primary); border:1px solid var(--border); justify-content:center; transition:0.2s; }
        .btn:active { transform:scale(0.96); }
        .btn-primary { background:var(--primary); color:white; border:none; }
        .btn-danger { background:var(--danger); color:white; border:none; }
        .btn-sm { padding:6px 14px; font-size:0.8rem; }
        .btn-outline { background:transparent; border:1.5px solid var(--border); color:var(--text); box-shadow:none; }

        .input-field { margin-bottom:12px; }
        .input-field label { font-size:0.75rem; font-weight:600; color:var(--text-secondary); display:block; margin-bottom:4px; }
        .input-field input, .input-field textarea { width:100%; padding:12px; border-radius:12px; border:1px solid var(--border); font-size:1rem; background:var(--input-bg); color:var(--text); }
        select { background:var(--input-bg); color:var(--text); border:1px solid var(--border); padding:10px 14px; border-radius:12px; font-size:var(--font-size-base); }
        .switch-track { width:44px; height:24px; background:#ccc; border-radius:12px; position:relative; cursor:pointer; }
        .switch-track.on { background:var(--primary); }
        .switch-thumb { width:20px; height:20px; background:white; border-radius:50%; position:absolute; top:2px; left:2px; transition:0.2s; }
        .switch-track.on .switch-thumb { left:22px; }

        .scanner-container { display:flex; flex-direction:column; gap:16px; }
        .scanner-wrapper { position:relative; width:100%; aspect-ratio:1/1; max-height:var(--camera-preview-height, 50vh); background:#000; border-radius:16px; overflow:hidden; box-shadow:0 8px 32px rgba(0,0,0,0.4); }
        .scanner-wrapper video { width:100%; height:100%; object-fit:cover; display:block; }
        .scanner-placeholder { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; color:var(--text-secondary); z-index:5; gap:10px; background:rgba(0,0,0,0.7); border-radius:16px; }
        .overlay { position:absolute; inset:0; pointer-events:none; z-index:10; display:none; }
        .scan-window { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:var(--scan-window-size, 45%); aspect-ratio:1/1; border-radius:14px; box-shadow:0 0 0 9999px rgba(0,0,0,0.65); z-index:11; }
        .corner { position:absolute; width:28px; height:28px; z-index:12; }
        .corner::before, .corner::after { content:''; position:absolute; background:#fff; border-radius:2px; }
        .corner-tl { top:-2px; left:-2px; } .corner-tl::before { top:0; left:0; width:28px; height:4px; } .corner-tl::after { top:0; left:0; width:4px; height:28px; }
        .corner-tr { top:-2px; right:-2px; } .corner-tr::before { top:0; right:0; width:28px; height:4px; } .corner-tr::after { top:0; right:0; width:4px; height:28px; }
        .corner-bl { bottom:-2px; left:-2px; } .corner-bl::before { bottom:0; left:0; width:28px; height:4px; } .corner-bl::after { bottom:0; left:0; width:4px; height:28px; }
        .corner-br { bottom:-2px; right:-2px; } .corner-br::before { bottom:0; right:0; width:28px; height:4px; } .corner-br::after { bottom:0; right:0; width:4px; height:28px; }
        .scan-line { position:absolute; left:6%; width:88%; height:2.5px; background:linear-gradient(90deg,transparent 0%,var(--scan-line-color) 20%,var(--scan-line-color) 80%,transparent 100%); border-radius:4px; z-index:13; pointer-events:none; box-shadow:0 0 16px 4px rgba(76,201,240,0.7); animation:scanMove 2.2s cubic-bezier(0.45,0,0.55,1) infinite; }
        .scan-line.cooling { background:linear-gradient(90deg,transparent 0%,#ef476f 20%,#ef476f 80%,transparent 100%); box-shadow:0 0 16px 4px rgba(239,71,111,0.7); animation-duration:1.2s; }
        @keyframes scanMove { 0%{top:8%;opacity:0.3} 15%{opacity:1} 50%{top:88%;opacity:1} 65%{opacity:0.3} 100%{top:8%;opacity:0.3} }
        .hint-text { position:absolute; bottom:14%; left:50%; transform:translateX(-50%); color:rgba(255,255,255,0.8); font-size:13px; z-index:14; }
        .controls-row { display:flex; gap:12px; flex-wrap:wrap; justify-content:center; align-items:center; }
        .result-card, .fields-card { background:var(--card-bg); border-radius:16px; padding:14px 16px; border:1px solid var(--border); color:var(--text); }
        .result-content { background:var(--input-bg); padding:8px 10px; border-radius:8px; font-family:monospace; margin-bottom:10px; max-height:80px; overflow-y:auto; color:var(--text); }
        .field-item { flex:1 1 30%; min-width:100px; display:flex; flex-direction:column; gap:4px; }
        .field-item input { background:var(--input-bg); border:1px solid var(--border); border-radius:8px; padding:8px 10px; color:var(--text); font-size:14px; outline:none; }
        .save-btn-row { margin-top:8px; display:flex; gap:8px; }
        .multiplier-group { display:flex; align-items:center; gap:6px; margin-bottom:10px; }
        .multiplier-group label { font-size:0.75rem; font-weight:600; color:var(--text-secondary); }
        .multiplier-group select { padding:8px 10px; border-radius:8px; background:var(--input-bg); border:1px solid var(--border); color:var(--text); font-size:14px; outline:none; width:100%; }

        .list-container { flex:1; overflow-y:auto; background:var(--card-bg); border-radius:16px; padding:8px 6px; border:1px solid var(--border); }
        .list-item { display:flex; justify-content:space-between; align-items:center; padding:12px 12px; border-bottom:1px solid var(--border); }
        .item-detail { display:flex; flex-direction:column; gap:2px; flex:1; }
        .item-part { font-weight:600; }
        .item-meta { font-size:0.7rem; color:var(--text-secondary); }
